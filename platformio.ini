; Self-registering modules (MODULE_REGISTER) aren't in the include chain
; from src/main.cpp, so PlatformIO LDF can't discover them automatically.
; All local libs and their external deps are listed here so every module
; compiles on every target. The #ifdef ENABLE_* guards compile disabled
; modules to nothing - no flash/RAM cost for unused modules.
[env]
; arduino-esp32 (espressif32@6.13.0) and pioarduino default to gnu++11.
; The shared MQTTClient deferred-dispatch lambdas use C++14 init-capture
; (`[cmdCopy = std::move(cmdCopy)]`) to move-capture local strings into
; the lambda body without an extra copy. Bump to gnu++14 globally so
; every env compiles those callsites cleanly. C++14 is a GCC 5+ feature
; (2015) and well-supported by every toolchain we ship.
build_unflags = -std=gnu++11
build_flags   = -std=gnu++14
lib_deps =
  ; Local modules (self-registering via MODULE_REGISTER)
  thesada-core
  thesada-mod-temperature
  thesada-mod-sht31
  thesada-mod-ads1115
  thesada-mod-battery
  thesada-mod-powermanager
  thesada-mod-telegram
  thesada-mod-httpserver
  thesada-mod-liteserver
  thesada-mod-cellular
  thesada-mod-gnss
  thesada-mod-scriptengine
  thesada-mod-sd
  thesada-mod-display
  thesada-mod-tftdisplay
  thesada-mod-pwm
  thesada-mod-lora
  ; External deps (shared - unused ones compile to nothing via #ifdef guards)
  knolleary/PubSubClient              @ ^2.8
  bblanchon/ArduinoJson               @ ^7.4.3
  paulstoffregen/OneWire              @ ^2.3.8
  milesburton/DallasTemperature       @ ^4.0.6
  vshymanskyy/TinyGSM                 @ ^0.12.0
  https://github.com/lewisxhe/XPowersLib.git
  adafruit/Adafruit ADS1X15           @ ^2.6.2
  https://github.com/ESP32Async/ESPAsyncWebServer.git
  https://github.com/sfranzyshen/ESP-Arduino-Lua.git
  olikraus/U8g2                          @ ^2.35.30
  jgromes/RadioLib                       @ ^7.0.0
  ; AsyncTCP pulled automatically by ESPAsyncWebServer (ESP32Async/AsyncTCP).

; LILYGO T-SIM7080-S3 - all modules enabled
; Module is ESP32-S3-WROOM-1-N16R8 (16MB flash, 8MB octal PSRAM).
; PSRAM enabled via memory_type=qio_opi. The arduino-esp32 bootloader is
; the same precompiled binary for all s3 envs and supports PSRAM; the
; memory_type setting only affects the app image header, which the
; bootloader re-reads at boot. Confirmed byte-identical bootloaders vs
; esp32-s3-debug env. The 2026-04-12 1.3.2 OTA failure was a TWDT panic
; in the download loop, not a memory-mode mismatch - fixed in the OTA
; watchdog-safe download loop (esp_task_wdt_reset per chunk, short
; socket/handshake timeouts).
[env:esp32-owb]
platform  = espressif32@6.13.0
board     = esp32-s3-devkitc-1
framework = arduino
monitor_speed  = 115200
monitor_echo   = yes
upload_speed   = 115200
board_build.filesystem = littlefs
board_build.arduino.memory_type = qio_opi
; LILYGO T-SIM7080G-S3 N16R8 silicon is 16 MB physical flash (Winbond
; W25Q128, verified via esptool flash_id). arduino-esp32 default config
; addresses only 4 MB; this layout reclaims the full chip.
board_upload.flash_size = 16MB
board_build.partitions  = partitions_owb_16mb.csv
upload_protocol        = esptool
extra_scripts  =
  pre:scripts/add_framework_libs.py
  post:scripts/copy_firmware.py
  post:scripts/generate_manifest.py
upload_flags =
  --before=no_reset
  --after=no_reset
  --no-stub
build_flags =
  -I src
  -DARDUINO_USB_CDC_ON_BOOT=0
  -DTINY_GSM_MODEM_SIM7080
  -DTINY_GSM_RX_BUFFER=4096
  -DBOARD_HAS_PSRAM

; OWB rescue build - stepping-stone firmware for remote unbricking.
; Inherits esp32-owb (same board, same memory settings, same production
; bootloader compatibility). BOARD_OWB_RESCUE strips every optional module
; via the override block in thesada_config.h; only core + PMU ship.
; PMU must stay (AXP2101 init required for VBUS accept on dumb chargers).
; Goal is a binary small enough that the buggy 1.3.1 OTA download completes
; before a readBytes() stall on the weak upstream trips the task watchdog.
[env:esp32-owb-rescue]
extends = env:esp32-owb
build_flags =
  ${env:esp32-owb.build_flags}
  -DBOARD_OWB_RESCUE

; Bench-only twin of esp32-owb with USB CDC console on the native S3
; USB-JTAG endpoint instead of UART0. Purpose: smoke-test OWB firmware
; on a raw board without a separate USB-UART adapter wired to GPIO43/44.
; All other OWB build flags (TinyGSM SIM7080, PSRAM, qio_opi memory)
; carry over via extends. Do NOT flash production OWB units with this:
; their UART0 is the live debug channel and USB-CDC interferes with
; the SIM7080 USB hub flow.
[env:esp32-owb-debug]
extends = env:esp32-owb
build_flags =
  -I src
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DTINY_GSM_MODEM_SIM7080
  -DTINY_GSM_RX_BUFFER=4096
  -DBOARD_HAS_PSRAM
  -DTHESADA_CELL_DEBUG
  -DENABLE_GNSS
  -DENABLE_LORA

; Bare ESP32-S3 devkit - USB CDC serial, no LILYGO hardware.
; Do not use for production (device waits for serial on boot).
; PSRAM is enabled here explicitly - this board gets flashed via USB so
; the bootloader always matches the app's memory settings.
[env:esp32-s3-debug]
extends = env:esp32-owb
board_build.arduino.memory_type = qio_opi
; Bare S3 bench modules ship with 8 MB GD25Q64 flash (verified via
; esptool flash_id). Override the inherited 16 MB OWB layout.
board_upload.flash_size = 8MB
board_build.partitions  = partitions_s3_8mb.csv
build_flags =
  -I src
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DBOARD_S3_BARE
  -DBOARD_HAS_PSRAM

; Bench-test twin of esp32-owb-rescue on sht31 hardware (BARE S3 + PSRAM).
; Purpose: validate the BOARD_OWB_RESCUE strip + C1 OTA fix + C2 heap code
; on real hardware via USB flash before the real OWB rescue ships OTA.
; Does NOT exercise PMU init (sht31 has no AXP2101); only core + WiFi +
; MQTT TLS + OTAUpdate are covered by this test.
[env:esp32-s3-debug-rescue]
extends = env:esp32-s3-debug
build_flags =
  ${env:esp32-s3-debug.build_flags}
  -DBOARD_OWB_RESCUE

