; Self-registering modules (MODULE_REGISTER) aren't in the include chain
; from src/main.cpp, so PlatformIO LDF can't discover them automatically.
; All local libs and their external deps are listed here so every module
; compiles on every target. The #ifdef ENABLE_* guards compile disabled
; modules to nothing - no flash/RAM cost for unused modules.
[env]
lib_deps =
  ; Local modules (self-registering via MODULE_REGISTER)
  thesada-core
  thesada-mod-temperature
  thesada-mod-sht31
  thesada-mod-ads1115
  thesada-mod-battery
  thesada-mod-powermanager
  thesada-mod-telegram
  thesada-mod-eth
  thesada-mod-httpserver
  thesada-mod-liteserver
  thesada-mod-cellular
  thesada-mod-scriptengine
  thesada-mod-sd
  thesada-mod-display
  thesada-mod-tftdisplay
  thesada-mod-pwm
  ; External deps (shared - unused ones compile to nothing via #ifdef guards)
  knolleary/PubSubClient              @ ^2.8
  bblanchon/ArduinoJson               @ ^7.4.3
  paulstoffregen/OneWire              @ ^2.3.8
  milesburton/DallasTemperature       @ ^4.0.6
  vshymanskyy/TinyGSM                 @ ^0.12.0
  https://github.com/lewisxhe/XPowersLib.git
  adafruit/Adafruit ADS1X15           @ ^2.6.2
  https://github.com/mathieucarbou/ESPAsyncWebServer.git
  https://github.com/sfranzyshen/ESP-Arduino-Lua.git
  olikraus/U8g2                          @ ^2.35.30
  ; AsyncTCP is vendored in lib/AsyncTCP/ with null-pointer crash fixes applied.

; LILYGO T-SIM7080-S3 - all modules enabled
[env:esp32-owb]
platform  = espressif32@6.13.0
board     = esp32-s3-devkitc-1
framework = arduino
monitor_speed  = 115200
monitor_echo   = yes
upload_speed   = 115200
board_build.filesystem = littlefs
upload_protocol        = esptool
extra_scripts  =
  pre:scripts/add_framework_libs.py
  post:scripts/copy_firmware.py
  post:scripts/generate_manifest.py
upload_flags =
  --before=no_reset
  --after=no_reset
  --no-stub
build_flags =
  -I src
  -DARDUINO_USB_CDC_ON_BOOT=0
  -DTINY_GSM_MODEM_SIM7080
  -DTINY_GSM_RX_BUFFER=1024

; ESP32-WROOM-32 - no cellular/PMU/battery/SD/sensors.
; OLED display, WiFi, MQTT, Lua, WebServer.
[env:esp32-wroom]
platform  = espressif32@6.13.0
board     = esp32dev
framework = arduino
monitor_speed  = 115200
monitor_echo   = yes
upload_speed   = 460800
board_build.filesystem      = littlefs
board_build.partitions      = min_spiffs.csv
extra_scripts  =
  pre:scripts/add_framework_libs.py
  post:scripts/copy_firmware.py
  post:scripts/generate_manifest.py
build_flags =
  -I src
  -DBOARD_WROOM32

; CYD (ESP32-2432S028R) - TFT touch display node.
; LiteServer replaces full HttpServer (not enough heap for AsyncTCP).
[env:esp32-cyd]
platform  = espressif32@6.13.0
board     = esp32dev
framework = arduino
monitor_speed  = 115200
monitor_echo   = yes
upload_speed   = 460800
board_build.filesystem      = littlefs
board_build.partitions      = min_spiffs.csv
extra_scripts  =
  pre:scripts/add_framework_libs.py
  post:scripts/copy_firmware.py
  post:scripts/generate_manifest.py
lib_deps =
  ${env.lib_deps}
  bodmer/TFT_eSPI                        @ ^2.5.43
  https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
build_flags =
  -I src
  -DBOARD_CYD
  ; TFT_eSPI config for CYD ESP32-2432S028R
  -DUSER_SETUP_LOADED=1
  -DILI9341_2_DRIVER=1
  -DTFT_WIDTH=240
  -DTFT_HEIGHT=320
  -DTFT_MOSI=13
  -DTFT_SCLK=14
  -DTFT_MISO=12
  -DTFT_CS=15
  -DTFT_DC=2
  -DTFT_RST=-1
  -DTFT_BL=21
  -DSPI_FREQUENCY=55000000
  -DSPI_READ_FREQUENCY=20000000
  -DSPI_TOUCH_FREQUENCY=2500000
  -DTOUCH_CS=33
  -DLOAD_GLCD=1
  -DLOAD_FONT2=1
  -DLOAD_FONT4=1
  -DLOAD_GFXFF=1
  -DSMOOTH_FONT=1

; Bare ESP32-S3 devkit - USB CDC serial, no LILYGO hardware.
; Do not use for production (device waits for serial on boot).
[env:esp32-s3-debug]
extends = env:esp32-owb
build_flags =
  -I src
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DBOARD_S3_BARE

; WT32-ETH01 (ESP32 + LAN8720A) - Ethernet primary, WiFi fallback.
; Used for hardwired nodes (well pump, basement sensors).
[env:esp32-eth]
platform  = espressif32@6.13.0
board     = esp32dev
framework = arduino
monitor_speed  = 115200
monitor_echo   = yes
upload_speed   = 460800
board_build.filesystem      = littlefs
board_build.partitions      = min_spiffs.csv
extra_scripts  =
  pre:scripts/add_framework_libs.py
  post:scripts/copy_firmware.py
  post:scripts/generate_manifest.py
build_flags =
  -I src
  -DBOARD_ETH
