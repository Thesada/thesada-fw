name: PlatformIO CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
            .pio/libdeps
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        # intelhex is an indirect runtime dep of the newer esptool.py that
        # ships with espressif32; pinning it explicitly so CI builds do
        # not fail with "ModuleNotFoundError: intelhex" on a fresh runner.
        run: pip install --upgrade platformio intelhex

      - name: Build all board targets
        run: |
          mkdir -p build/boards

          # OWB (LILYGO T-SIM7080G-S3 - primary production, all modules)
          pio run -e esp32-owb
          cp .pio/build/esp32-owb/firmware.bin build/boards/firmware-owb.bin
          cp build/firmware.json build/boards/firmware-owb.json

          # OWB rescue (core + PMU only - remote unbricking stepping-stone)
          pio run -e esp32-owb-rescue
          cp .pio/build/esp32-owb-rescue/firmware.bin build/boards/firmware-owb-rescue.bin

          # Bench/debug envs - compile coverage only, not shipped as releases.
          pio run -e esp32-owb-debug
          pio run -e esp32-s3-debug
          pio run -e esp32-s3-debug-rescue

          # Keep OWB as the default firmware.bin for backwards compat
          cp build/boards/firmware-owb.bin build/firmware.bin

      - name: Build minimal firmware (OWB core only)
        run: |
          cp src/thesada_config.h src/thesada_config.h.bak
          sed -i 's/^#define ENABLE_TEMPERATURE/\/\/ #define ENABLE_TEMPERATURE/' src/thesada_config.h
          sed -i 's/^#define ENABLE_ADS1115/\/\/ #define ENABLE_ADS1115/' src/thesada_config.h
          sed -i 's/^#define ENABLE_BATTERY/\/\/ #define ENABLE_BATTERY/' src/thesada_config.h
          sed -i 's/^#define ENABLE_PMU/\/\/ #define ENABLE_PMU/' src/thesada_config.h
          sed -i 's/^#define ENABLE_SD/\/\/ #define ENABLE_SD/' src/thesada_config.h
          sed -i 's/^#define ENABLE_CELLULAR/\/\/ #define ENABLE_CELLULAR/' src/thesada_config.h
          sed -i 's/^#define ENABLE_TELEGRAM/\/\/ #define ENABLE_TELEGRAM/' src/thesada_config.h
          sed -i 's/^#define ENABLE_WEBSERVER/\/\/ #define ENABLE_WEBSERVER/' src/thesada_config.h
          sed -i 's/^#define ENABLE_SCRIPTENGINE/\/\/ #define ENABLE_SCRIPTENGINE/' src/thesada_config.h
          pio run -e esp32-owb
          cp .pio/build/esp32-owb/firmware.bin build/firmware_minimal.bin
          mv src/thesada_config.h.bak src/thesada_config.h

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: firmware
          path: |
            build/firmware.bin
            build/firmware_minimal.bin
            build/firmware.json
            build/boards/

  lua-tests:
    # Host-side Lua harness - exercises data/scripts/*.lua against the
    # mocked firmware bindings (tests/lua/). Fast, no PlatformIO needed;
    # runs in parallel with the board builds and gates the release.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Install Lua 5.3
        run: sudo apt-get update && sudo apt-get install -y lua5.3

      - name: Run Lua test suite
        run: lua5.3 tests/lua/run_all.lua

  invariant-ledger:
    # Server-side mirror of scripts/hooks/pre-commit: refuses a push or PR
    # that touches load-bearing source without updating docs/invariants.md.
    # Pre-commit guards a local commit; this job guards anything that
    # arrives via a direct push or a contributor who has not installed
    # the hooks. Bypass with `INVARIANT_OK: 1` trailer in any commit in
    # the range.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          # Need the merge base for PRs; full history for pushes so we can
          # walk back to the previous commit on the branch.
          fetch-depth: 0

      - name: Resolve change range
        id: range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            # push event: before is the prior tip on the branch
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi
          # First push to a new branch has all-zero `before`; fall back to
          # parent of HEAD so the check still runs against a real diff.
          if [ "$base" = "0000000000000000000000000000000000000000" ] || [ -z "$base" ]; then
            base="$(git rev-parse "$head^" 2>/dev/null || echo "$head")"
          fi
          echo "base=$base" >> "$GITHUB_OUTPUT"
          echo "head=$head" >> "$GITHUB_OUTPUT"

      - name: Check for INVARIANT_OK bypass trailer in range
        id: bypass
        run: |
          if git log --format=%B "${{ steps.range.outputs.base }}..${{ steps.range.outputs.head }}" \
              | grep -qE '^INVARIANT_OK:[[:space:]]*1[[:space:]]*$'; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run ledger check
        if: steps.bypass.outputs.found != 'true'
        run: |
          git diff --name-only "${{ steps.range.outputs.base }}..${{ steps.range.outputs.head }}" \
            | ./scripts/check-invariant-ledger.sh

      - name: Note bypass
        if: steps.bypass.outputs.found == 'true'
        run: echo "INVARIANT_OK trailer found in commit range - skipping ledger check."

  release:
    needs: [build, lua-tests, invariant-ledger]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history + tags - the changelog step needs the previous
          # tag (git describe) and the prev..HEAD commit range. A shallow
          # clone leaves both empty, so every release note collapsed to
          # the merge commit and a main...vX diff that compares to itself.
          fetch-depth: 0

      - name: Extract version from config.h
        id: version
        run: |
          VERSION=$(grep -oP '(?<=")\d+\.\d+\.\d+(?=")' src/thesada_config.h)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Check if release already exists
        id: check_tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release v${{ steps.version.outputs.version }} already exists - skipping"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "New version v${{ steps.version.outputs.version }} - will create release"
          fi

      - name: Download build artifacts
        if: steps.check_tag.outputs.exists == 'false'
        uses: actions/download-artifact@v8
        with:
          name: firmware
          path: artifacts

      - name: Generate changelog
        if: steps.check_tag.outputs.exists == 'false'
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log "$PREV_TAG..HEAD" --pretty=format:"- %s" --no-merges | grep -v "^- release:" || true)
          else
            LOG=$(git log --pretty=format:"- %s" --no-merges -20 | grep -v "^- release:" || true)
          fi
          echo "$LOG" > /tmp/changelog.txt
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Create release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          PREV="${{ steps.changelog.outputs.prev_tag }}"
          CHANGELOG=$(cat /tmp/changelog.txt)
          cat > /tmp/notes.md << EOF
          ## Changes

          ${CHANGELOG}

          **Full diff:** https://github.com/${{ github.repository }}/compare/${PREV:-main}...${TAG}
          EOF

          gh release create "$TAG" \
            artifacts/firmware.bin \
            artifacts/firmware_minimal.bin \
            artifacts/firmware.json \
            artifacts/boards/firmware-owb.bin \
            artifacts/boards/firmware-owb-rescue.bin \
            --title "thesada-fw $TAG" \
            --notes-file /tmp/notes.md
