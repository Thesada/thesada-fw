; CYD (ESP32-2432S028R) hardware validation test

[env:cyd-test]
platform  = espressif32@6.13.0
board     = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed  = 460800

lib_deps =
  bodmer/TFT_eSPI @ ^2.5.43
  https://github.com/PaulStoffregen/XPT2046_Touchscreen.git

; TFT_eSPI pin config for CYD ESP32-2432S028R
; Using ILI9341_2_DRIVER which handles newer CYD variants correctly
build_flags =
  -DUSER_SETUP_LOADED=1
  -DILI9341_2_DRIVER=1
  -DTFT_WIDTH=240
  -DTFT_HEIGHT=320
  -DTFT_MOSI=13
  -DTFT_SCLK=14
  -DTFT_MISO=12
  -DTFT_CS=15
  -DTFT_DC=2
  -DTFT_RST=-1
  -DTFT_BL=21
  -DSPI_FREQUENCY=55000000
  -DSPI_READ_FREQUENCY=20000000
  -DSPI_TOUCH_FREQUENCY=2500000
  -DTOUCH_CS=33
